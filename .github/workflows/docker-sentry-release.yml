name: Build/Push docker image and tag the release in sentry
on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: 'Tag name to use for the image (required if manually running)'
        required: true
        type: string
  release:
    types: [published]
jobs:
  main:
    if: github.repository == 'oncokb/oncokb-public'
    name: Build and Push
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 12.16.1
      SPRING_OUTPUT_ANSI_ENABLED: DETECT
      SPRING_JPA_SHOW_SQL: false
      JHI_DISABLE_WEBPACK_LOGS: true
      VERSION: ${{ inputs.tag-name || github.ref }}
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 12.16.1
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Install node.js packages
        run: yarn install
      - name: Package application with Jib
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
          TAG_NAME: ${{ inputs.tag-name || github.ref_name }}
          REPOSITORY: 'mskcc/oncokb-public'
        run: |
          ./mvnw -ntp package -Pprod verify jib:build \
          -DskipTests \
          -Djib.to.image="${REPOSITORY}:${TAG_NAME}" \
          -Djib.to.auth.username=$DOCKER_USERNAME \
          -Djib.to.auth.password=$DOCKER_PASSWORD
